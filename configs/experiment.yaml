seed: 42

preprocessing:
  tokenizer_name: roberta-base
  max_seq_len: 512
  remove_urls: true
  remove_mentions: true

training:
  batch_size: 8
  epochs: 5
  learning_rate: 1.0e-5
  grid:
    hidden_units: [128, 256, 512]
    learning_rate: [1.0e-4, 1.0e-5, 1.0e-6]

runtime:
  device: null

data_cache:
  enabled: true
  root: data/cache
  build_if_missing: false
  version: token-cache-v1
  chunk_size: 50000
  tokenize_batch_size: 1024